spring:
  application:
    name: gemblog-pro

  # ---------------------------------------------------------------------
  # MySQL datasource (replaces server/config/db.js's mongoose.connect call)
  # Values are sourced from environment variables so no credentials are
  # committed to source control, mirroring the .env approach used by the
  # original Express project.
  # ---------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gemblog_pro?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP is Spring Boot's default connection pool (bundled transitively via
    # spring-boot-starter-data-jpa / spring-boot-starter-jdbc) - no extra dependency
    # is required, only configuration.
    hikari:
      pool-name: GemBlogProHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------
  # JPA / Hibernate
  # ddl-auto=update per approved change #1: Flyway is deferred; Hibernate
  # manages schema creation/updates directly for this initial implementation.
  # ---------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  # ---------------------------------------------------------------------
  # Multipart upload (replaces middleware/multer.js's memoryStorage config).
  # Sized generously for blog thumbnail images; tightened later if needed.
  # ---------------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

