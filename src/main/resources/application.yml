spring:
  application:
    name: gemblog-pro

  # ---------------------------------------------------------------------
  # MySQL datasource (replaces server/config/db.js's mongoose.connect call)
  # Values are sourced from environment variables so no credentials are
  # committed to source control, mirroring the .env approach used by the
  # original Express project.
  # ---------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gemblog_pro?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:sumit}
    password: ${DB_PASSWORD:Sammy@0364}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP is Spring Boot's default connection pool (bundled transitively via
    # spring-boot-starter-data-jpa / spring-boot-starter-jdbc) - no extra dependency
    # is required, only configuration.
    hikari:
      pool-name: GemBlogProHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------
  # JPA / Hibernate
  # ddl-auto=update per approved change #1: Flyway is deferred; Hibernate
  # manages schema creation/updates directly for this initial implementation.
  # ---------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  # ---------------------------------------------------------------------
  # MVC (Phase 5). Routes unmatched requests to a NoHandlerFoundException
  # (caught by GlobalExceptionHandler and returned in our standard
  # {success,message} envelope) instead of Spring Boot's default static-
  # resource fallback / whitelabel error page.
  # ---------------------------------------------------------------------
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # ---------------------------------------------------------------------
  # Multipart upload (replaces middleware/multer.js's memoryStorage config).
  # Sized generously for blog thumbnail images; tightened later if needed.
  # ---------------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

# ---------------------------------------------------------------------
# Logging (Phase 5). Keeps SQL noise out of the default console at INFO
# while surfacing our own application logging (SLF4J, added throughout the
# service/security/exception layers in Phase 5) at DEBUG. Override per
# environment with LOG_LEVEL_ROOT / LOG_LEVEL_APP without editing this file.
# ---------------------------------------------------------------------
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.gemblogpro: ${LOG_LEVEL_APP:DEBUG}
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"

# ---------------------------------------------------------------------
# Actuator (Phase 5). Exposes GET /actuator/health, used by the Docker
# HEALTHCHECK instruction and by Render's health check configuration.
# Only `health` and `info` are exposed - no metrics/env/beans endpoints,
# which can leak configuration details if left open on a public deployment.
# ---------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ---------------------------------------------------------------------
# JWT (Phase 3). Replaces process.env.JWT_SECRET used by jwt.sign/jwt.verify
# in adminController.js / middleware/auth.js. No default is given for the
# secret itself - the app fails fast at startup if JWT_SECRET is unset
# rather than silently signing tokens with an empty/weak key. It must be a
# high-entropy value at least 32 bytes long once UTF-8 encoded (HS256
# requirement) - e.g. `openssl rand -base64 48`.
# expiration-days: 7 matches the original `{expiresIn: '7d'}` exactly.
# ---------------------------------------------------------------------
jwt:
  secret: ${JWT_SECRET:my-super-secret-key-12345678901234567890}
  expiration-days: ${JWT_EXPIRATION_DAYS:7}

# ---------------------------------------------------------------------
# ImageKit (Phase 4). Replaces config/imageKit.js's publicKey/privateKey/
# urlEndpoint, read there from process.env.IMAGEKIT_*. No defaults - the
# blog image upload endpoint will fail with a clear ExternalServiceException
# rather than silently calling ImageKit with a blank key.
# ---------------------------------------------------------------------
imagekit:
  public-key: ${IMAGEKIT_PUBLIC_KEY:dummy-public-key}
  private-key: ${IMAGEKIT_PRIVATE_KEY:dummy-private-key}
  url-endpoint: ${IMAGEKIT_URL_ENDPOINT:https://dummy.imagekit.io}

# ---------------------------------------------------------------------
# Gemini (Phase 4). Replaces config/gemini.js's `new GoogleGenAI({apiKey:
# process.env.GEMINI_API_KEY})`. Model defaults to gemini-2.5-flash,
# matching the hardcoded model name used in the original main() function.
# ---------------------------------------------------------------------
gemini:
  api-key: ${GEMINI_API_KEY:dummy-gemini-key}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
