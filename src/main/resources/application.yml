spring:
  application:
    name: gemblog-pro

  # ---------------------------------------------------------------------
  # MySQL datasource (replaces server/config/db.js's mongoose.connect call)
  # Values are sourced from environment variables so no credentials are
  # committed to source control, mirroring the .env approach used by the
  # original Express project.
  # ---------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gemblog_pro?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: sumit
    password: Sammy@0364
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP is Spring Boot's default connection pool (bundled transitively via
    # spring-boot-starter-data-jpa / spring-boot-starter-jdbc) - no extra dependency
    # is required, only configuration.
    hikari:
      pool-name: GemBlogProHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------
  # JPA / Hibernate
  # ddl-auto=update per approved change #1: Flyway is deferred; Hibernate
  # manages schema creation/updates directly for this initial implementation.
  # ---------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  # ---------------------------------------------------------------------
  # Multipart upload (replaces middleware/multer.js's memoryStorage config).
  # Sized generously for blog thumbnail images; tightened later if needed.
  # ---------------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

# ---------------------------------------------------------------------
# JWT (Phase 3). Replaces process.env.JWT_SECRET used by jwt.sign/jwt.verify
# in adminController.js / middleware/auth.js. No default is given for the
# secret itself - the app fails fast at startup if JWT_SECRET is unset
# rather than silently signing tokens with an empty/weak key. It must be a
# high-entropy value at least 32 bytes long once UTF-8 encoded (HS256
# requirement) - e.g. `openssl rand -base64 48`.
# expiration-days: 7 matches the original `{expiresIn: '7d'}` exactly.
# ---------------------------------------------------------------------
jwt:
  secret: thisIsMyVeryLongSecretKeyForTesting123456789
  expiration-days: ${JWT_EXPIRATION_DAYS:7}

# ---------------------------------------------------------------------
# Reserved for later phases (ImageKit, Gemini). Not read by any code yet -
